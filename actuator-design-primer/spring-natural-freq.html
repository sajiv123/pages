<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1DOF Arm Spring System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:24px;background:#e8ecf1;font-family:'proxima-nova','Nunito Sans',sans-serif}
body.embedded{padding:0;background:transparent}
*{margin:0;padding:0;box-sizing:border-box}
#root{background:#f5f7fa;color:#1e2a3a;padding:28px 32px;max-width:840px;margin:0 auto;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
body.embedded #root{max-width:none;border-radius:0;box-shadow:none;background:#fff;padding:16px 24px 8px}
.title{font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;font-weight:700}
.slbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#6b7a8d;margin-bottom:8px;font-weight:600}
.main{display:flex;gap:20px;margin-bottom:8px}
.lcol{width:300px;flex-shrink:0}
.rcol{flex:1;min-width:0}
canvas{display:block}
.arm-cv{width:300px;height:220px;margin-bottom:12px}
.gcv{width:100%;height:400px;border:1px solid #d5dae2;border-radius:4px;background:#fff}
.tg{display:flex;gap:0;margin-bottom:-1px;position:relative;z-index:1}
.tb{padding:5px 10px;font-family:inherit;font-size:9px;letter-spacing:1.2px;text-transform:uppercase;border:1px solid #d5dae2;background:transparent;color:#8d99a8;cursor:pointer;margin-right:-1px;font-weight:600;white-space:nowrap}
.tb.ac{background:#fff;color:#1e2a3a;border-bottom-color:#fff}
.sc{margin-bottom:8px}
.sc label{display:flex;justify-content:space-between;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#6b7a8d;font-weight:600;margin-bottom:3px}
.sc label .sym{text-transform:none;letter-spacing:0}
.sc label .sv{color:#1e2a3a;letter-spacing:0;font-weight:700}
.sc input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:#d5dae2;border-radius:2px;outline:none}
.sc input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#2563eb;border-radius:50%;cursor:pointer}
.sc input[type=range]::-moz-range-thumb{width:14px;height:14px;background:#2563eb;border-radius:50%;cursor:pointer;border:none}
.sc.drive input[type=range]::-webkit-slider-thumb{background:#e05a2b}
.sc.drive input[type=range]::-moz-range-thumb{background:#e05a2b}
.sec-gap{margin-top:14px}
.st{font-size:10px;letter-spacing:.5px;color:#6b7a8d;margin-top:6px;margin-bottom:8px;min-height:14px;font-weight:500;line-height:1.6}
.lgd{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
.lgd-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#6b7a8d;font-weight:600}
.lgd-line{width:14px;height:2px;border-radius:1px}
.lgd-dash{width:14px;height:0;border-top:2px dashed}
</style>
</head>
<body>
<div id="root">
  <div class="title">1DOF ARM: BASE → SPRING → ARM</div>
  <div class="main">
    <div class="lcol">
      <canvas class="arm-cv" id="aCv" width="600" height="440"></canvas>
      <div class="slbl sec-gap">SYSTEM CONFIG</div>
      <div class="sc">
        <label>STIFFNESS (K) <span class="sv" id="kVal"></span></label>
        <input type="range" id="kR" min="1" max="100" step="1" value="50">
      </div>
      <div class="sc">
        <label>JOINT INERTIA (J) <span class="sv" id="jVal"></span></label>
        <input type="range" id="jR" min="0.01" max="1.0" step="0.01" value="0.50">
      </div>
      <div class="slbl sec-gap">DRIVE CONFIG</div>
      <div class="sc drive">
        <label><span>DRIVE FREQUENCY <span class="sym">(ω<sub>d</sub>)</span></span> <span class="sv" id="wVal"></span></label>
        <input type="range" id="wR" min="0.5" max="40" step="0.5" value="5">
      </div>
    </div>
    <div class="rcol">
      <div class="tg">
        <button class="tb ac" data-t="bode">BODE PLOT</button>
        <button class="tb" data-t="time">TIME DOMAIN</button>
      </div>
      <canvas class="gcv" id="gCv"></canvas>
      <div class="lgd" id="lgd"></div>
    </div>
  </div>
</div>
<script>
if(window.self!==window.top){document.body.classList.add('embedded');
function notifyHeight(){const h=document.getElementById('root').offsetHeight+16;window.parent.postMessage({type:'embed-height',height:h},'*')}
new ResizeObserver(notifyHeight).observe(document.getElementById('root'));
window.addEventListener('load',notifyHeight)}

const PI=Math.PI;
const S={K:50,J:0.5,zeta:0.5,wDrive:5,tab:'bode',animTime:0,simData:null};
const aCv=document.getElementById('aCv'),ax=aCv.getContext('2d');
const gCv=document.getElementById('gCv'),gx=gCv.getContext('2d');
ax.scale(2,2);
const FF='"proxima-nova","Nunito Sans",sans-serif';

function rgc(){const r=gCv.getBoundingClientRect();gCv.width=r.width*2;gCv.height=400*2;gx.setTransform(2,0,0,2,0,0)}
function getWn(){return Math.sqrt(S.K/S.J)}
function getC(){return 2*S.zeta*Math.sqrt(S.K*S.J)}
function thIn(t){return(PI/2)*(1-Math.cos(S.wDrive*t))}
function thInD(t){return(PI/2)*S.wDrive*Math.sin(S.wDrive*t)}

function simulate(){
  const dt=0.0005,nCyc=4,T=nCyc*2*PI/S.wDrive;
  const n=Math.ceil(T/dt);
  const times=new Float64Array(n),tIn=new Float64Array(n),tOut=new Float64Array(n);
  let y0=0,y1=0;
  const KJ=S.K/S.J,cJ=getC()/S.J;
  for(let i=0;i<n;i++){
    const t=i*dt;times[i]=t;tIn[i]=thIn(t);tOut[i]=y0;
    const f=(tt,a,b)=>KJ*(thIn(tt)-a)+cJ*(thInD(tt)-b);
    const k1v=f(t,y0,y1),k1p=y1;
    const k2v=f(t+dt/2,y0+k1p*dt/2,y1+k1v*dt/2),k2p=y1+k1v*dt/2;
    const k3v=f(t+dt/2,y0+k2p*dt/2,y1+k2v*dt/2),k3p=y1+k2v*dt/2;
    const k4v=f(t+dt,y0+k3p*dt,y1+k3v*dt),k4p=y1+k3v*dt;
    y0+=(k1p+2*k2p+2*k3p+k4p)*dt/6;
    y1+=(k1v+2*k2v+2*k3v+k4v)*dt/6;
  }
  S.simData={times,tIn,tOut,T,n,dt};S.animTime=0;
}

function bodeData(){
  const wn=getWn(),pts=[],N=300,wMin=0.5,wMax=100;
  for(let i=0;i<N;i++){
    const t=i/(N-1),w=wMin*Math.pow(wMax/wMin,t),r=w/wn;
    const den=Math.sqrt((1-r*r)*(1-r*r)+(2*S.zeta*r)*(2*S.zeta*r));
    pts.push({w,magDb:20*Math.log10(1/den),phase:-Math.atan2(2*S.zeta*r,1-r*r)*180/PI});
  }
  return pts;
}

function drawArm(){
  const w=300,h=220;ax.clearRect(0,0,w,h);
  const cx=150,cy=110,armL=80;
  let aIn=0,aOut=0;
  if(S.simData){
    const sd=S.simData,idx=Math.min(Math.floor(S.animTime/sd.dt),sd.n-1);
    aIn=sd.tIn[Math.max(0,idx)];aOut=sd.tOut[Math.max(0,idx)];
  }
  // reference line
  ax.setLineDash([4,4]);ax.strokeStyle='#d5dae2';ax.lineWidth=1;
  ax.beginPath();ax.moveTo(cx,cy);ax.lineTo(cx+armL+20,cy);ax.stroke();ax.setLineDash([]);
  // input arm (shadow)
  const inX=cx+armL*Math.cos(-aIn),inY=cy+armL*Math.sin(-aIn);
  ax.strokeStyle='rgba(155,165,180,0.55)';ax.lineWidth=8;ax.lineCap='round';
  ax.beginPath();ax.moveTo(cx,cy);ax.lineTo(inX,inY);ax.stroke();
  ax.fillStyle='rgba(155,165,180,0.45)';ax.beginPath();ax.arc(inX,inY,5,0,PI*2);ax.fill();
  // spring arc
  const diff=aOut-aIn;
  if(Math.abs(diff)>0.015){
    const teeth=10,amp=4,sR=22;
    ax.strokeStyle='#16a34a';ax.lineWidth=1.5;ax.lineCap='butt';ax.beginPath();
    for(let i=0;i<=teeth*2;i++){
      const t=i/(teeth*2),a=aIn+diff*t,r=sR+(i%2===0?-amp:amp);
      const x=cx+r*Math.cos(-a),y=cy+r*Math.sin(-a);
      if(i===0)ax.moveTo(x,y);else ax.lineTo(x,y);
    }
    ax.stroke();
  }
  // output arm
  const outX=cx+armL*Math.cos(-aOut),outY=cy+armL*Math.sin(-aOut);
  ax.strokeStyle='#2563eb';ax.lineWidth=8;ax.lineCap='round';
  ax.beginPath();ax.moveTo(cx,cy);ax.lineTo(outX,outY);ax.stroke();
  ax.fillStyle='#2563eb';ax.beginPath();ax.arc(outX,outY,5,0,PI*2);ax.fill();
  // pivot
  ax.fillStyle='#1e2a3a';ax.beginPath();ax.arc(cx,cy,4,0,PI*2);ax.fill();
  ax.fillStyle='#f5f7fa';ax.beginPath();ax.arc(cx,cy,2,0,PI*2);ax.fill();
  // labels
  ax.font='600 9px '+FF;
  ax.fillStyle='rgba(140,150,165,0.9)';ax.textAlign='left';
  const ilx=inX<cx?inX-28:inX+8,ily=inY<cy?inY+14:inY-6;
  ax.fillText('input',ilx,ily);
  ax.fillStyle='#2563eb';
  const olx=outX<cx?outX-32:outX+8,oly=outY<cy?outY-6:outY+14;
  ax.fillText('output',olx,oly);
  // angle readout
  ax.font='500 9px '+FF;ax.fillStyle='#6b7a8d';ax.textAlign='center';
  ax.fillText(Math.round(aOut*180/PI)+'°',cx,h-6);
}

function drawBode(){
  const r=gCv.getBoundingClientRect(),w=r.width,h=400;
  gx.clearRect(0,0,w,h);
  const pts=bodeData(),wn=getWn();
  const ml=52,mr=12,mt=18,mb=28,gap=24;
  const pH=(h-mt-mb-gap)/2;
  const wMin=0.5,wMax=100,logMin=Math.log10(wMin),logMax=Math.log10(wMax);
  const xS=(w-ml-mr)/(logMax-logMin);
  function xOf(f){return ml+(Math.log10(f)-logMin)*xS}

  // --- Magnitude ---
  const mT=mt,mB=mt+pH,magMin=-40,magMax=10;
  function yMag(db){return mT+(magMax-db)/(magMax-magMin)*pH}
  gx.strokeStyle='#e8ecf1';gx.lineWidth=0.5;
  gx.font='500 7.5px '+FF;gx.fillStyle='#a0a8b4';gx.textAlign='right';
  for(let db=magMin;db<=magMax;db+=10){
    const y=yMag(db);gx.beginPath();gx.moveTo(ml,y);gx.lineTo(w-mr,y);gx.stroke();
    gx.fillText(db,ml-4,y+3);
  }
  [1,2,5,10,20,50].forEach(f=>{const x=xOf(f);gx.beginPath();gx.moveTo(x,mT);gx.lineTo(x,mB);gx.stroke()});
  gx.strokeStyle='#2563eb';gx.lineWidth=2;gx.beginPath();
  pts.forEach((p,i)=>{const x=xOf(p.w),y=Math.max(mT,Math.min(mB,yMag(p.magDb)));i===0?gx.moveTo(x,y):gx.lineTo(x,y)});
  gx.stroke();
  gx.strokeStyle='#d5dae2';gx.lineWidth=1;gx.strokeRect(ml,mT,w-ml-mr,pH);
  gx.save();gx.translate(10,mT+pH/2);gx.rotate(-PI/2);
  gx.fillStyle='#6b7a8d';gx.font='600 8px '+FF;gx.textAlign='center';gx.fillText('Gain (dB)',0,0);gx.restore();

  // --- Phase ---
  const pT=mB+gap,pB=pT+pH,phMin=-200,phMax=20;
  function yPh(ph){return pT+(phMax-ph)/(phMax-phMin)*pH}
  gx.strokeStyle='#e8ecf1';gx.lineWidth=0.5;gx.fillStyle='#a0a8b4';gx.font='500 7.5px '+FF;gx.textAlign='right';
  [-180,-135,-90,-45,0].forEach(ph=>{
    const y=yPh(ph);gx.beginPath();gx.moveTo(ml,y);gx.lineTo(w-mr,y);gx.stroke();
    gx.fillText(ph+'°',ml-4,y+3);
  });
  [1,2,5,10,20,50].forEach(f=>{const x=xOf(f);gx.beginPath();gx.moveTo(x,pT);gx.lineTo(x,pB);gx.stroke()});
  gx.strokeStyle='#2563eb';gx.lineWidth=2;gx.beginPath();
  pts.forEach((p,i)=>{const x=xOf(p.w),y=Math.max(pT,Math.min(pB,yPh(p.phase)));i===0?gx.moveTo(x,y):gx.lineTo(x,y)});
  gx.stroke();
  gx.strokeStyle='#d5dae2';gx.lineWidth=1;gx.strokeRect(ml,pT,w-ml-mr,pH);
  gx.save();gx.translate(10,pT+pH/2);gx.rotate(-PI/2);
  gx.fillStyle='#6b7a8d';gx.font='600 8px '+FF;gx.textAlign='center';gx.fillText('Phase (°)',0,0);gx.restore();

  // ωn marker
  if(wn>=wMin&&wn<=wMax){
    const x=xOf(wn);gx.setLineDash([4,3]);gx.strokeStyle='#e05a2b';gx.lineWidth=1;
    gx.beginPath();gx.moveTo(x,mT);gx.lineTo(x,pB);gx.stroke();gx.setLineDash([]);
    gx.fillStyle='#e05a2b';gx.font='600 8px '+FF;gx.textAlign='center';
    gx.fillText('ωn='+wn.toFixed(1),x,mT-5);
  }
  // ωd marker
  if(S.wDrive>=wMin&&S.wDrive<=wMax){
    const x=xOf(S.wDrive);gx.setLineDash([2,2]);gx.strokeStyle='#16a34a';gx.lineWidth=1;
    gx.beginPath();gx.moveTo(x,mT);gx.lineTo(x,pB);gx.stroke();gx.setLineDash([]);
    gx.fillStyle='#16a34a';gx.font='600 8px '+FF;gx.textAlign='center';
    gx.fillText('ωd='+S.wDrive.toFixed(1),x,pB+12);
  }
  // x-axis labels
  gx.fillStyle='#a0a8b4';gx.font='500 7.5px '+FF;gx.textAlign='center';
  [1,2,5,10,20,50].forEach(f=>{gx.fillText(f,xOf(f),pB+12)});
  gx.fillStyle='#6b7a8d';gx.font='600 8px '+FF;gx.fillText('frequency (rad/s)',ml+(w-ml-mr)/2,h-6);
}

function drawTime(){
  const r=gCv.getBoundingClientRect(),w=r.width,h=400;
  gx.clearRect(0,0,w,h);
  if(!S.simData)return;
  const sd=S.simData;
  const ml=45,mr=12,mt=18,mb=28;
  const pW=w-ml-mr,pH=h-mt-mb;
  // find y range from data
  let yLo=0,yHi=PI;
  for(let i=0;i<sd.n;i++){
    if(sd.tOut[i]<yLo)yLo=sd.tOut[i];
    if(sd.tOut[i]>yHi)yHi=sd.tOut[i];
  }
  const pad=(yHi-yLo)*0.1;yLo-=pad;yHi+=pad;
  function yOf(v){return mt+(yHi-v)/(yHi-yLo)*pH}
  function xOf(t){return ml+t/sd.T*pW}
  // grid
  gx.strokeStyle='#e8ecf1';gx.lineWidth=0.5;gx.font='500 7.5px '+FF;gx.fillStyle='#a0a8b4';gx.textAlign='right';
  [0,PI/4,PI/2,3*PI/4,PI].forEach(v=>{
    if(v<yLo||v>yHi)return;
    const y=yOf(v);gx.beginPath();gx.moveTo(ml,y);gx.lineTo(w-mr,y);gx.stroke();
    const lbl=v===0?'0':v===PI?'π':v===PI/2?'π/2':v===PI/4?'π/4':'3π/4';
    gx.fillText(lbl,ml-4,y+3);
  });
  gx.textAlign='center';
  const tStep=sd.T/8;
  for(let t=0;t<=sd.T;t+=tStep){
    const x=xOf(t);gx.beginPath();gx.moveTo(x,mt);gx.lineTo(x,mt+pH);gx.stroke();
    gx.fillText(t.toFixed(1)+'s',x,mt+pH+12);
  }
  // draw input
  const skip=Math.max(1,Math.floor(sd.n/800));
  gx.setLineDash([5,4]);gx.strokeStyle='#9ba5b4';gx.lineWidth=1.5;gx.beginPath();
  for(let i=0;i<sd.n;i+=skip){const x=xOf(sd.times[i]),y=yOf(sd.tIn[i]);i===0?gx.moveTo(x,y):gx.lineTo(x,y)}
  gx.stroke();gx.setLineDash([]);
  // draw output
  gx.strokeStyle='#2563eb';gx.lineWidth=2;gx.beginPath();
  for(let i=0;i<sd.n;i+=skip){const x=xOf(sd.times[i]),y=yOf(sd.tOut[i]);i===0?gx.moveTo(x,y):gx.lineTo(x,y)}
  gx.stroke();
  // cursor
  const cx=xOf(S.animTime);
  if(cx>=ml&&cx<=w-mr){
    gx.setLineDash([2,2]);gx.strokeStyle='#e05a2b';gx.lineWidth=1;
    gx.beginPath();gx.moveTo(cx,mt);gx.lineTo(cx,mt+pH);gx.stroke();gx.setLineDash([]);
    // dots on curves at cursor
    const idx=Math.min(Math.floor(S.animTime/sd.dt),sd.n-1);
    gx.fillStyle='#9ba5b4';gx.beginPath();gx.arc(cx,yOf(sd.tIn[idx]),3,0,PI*2);gx.fill();
    gx.fillStyle='#2563eb';gx.beginPath();gx.arc(cx,yOf(sd.tOut[idx]),3,0,PI*2);gx.fill();
  }
  // border
  gx.strokeStyle='#d5dae2';gx.lineWidth=1;gx.strokeRect(ml,mt,pW,pH);
  // axis labels
  gx.fillStyle='#6b7a8d';gx.font='600 8px '+FF;gx.textAlign='center';
  gx.fillText('time (s)',ml+pW/2,h-6);
  gx.save();gx.translate(10,mt+pH/2);gx.rotate(-PI/2);gx.fillText('position (rad)',0,0);gx.restore();
}

function updateLegend(){
  const l=document.getElementById('lgd');
  if(S.tab==='bode')
    l.innerHTML='<div class="lgd-item"><div class="lgd-line" style="background:#2563eb"></div>G(jω)</div>'+
      '<div class="lgd-item"><div class="lgd-dash" style="border-color:#e05a2b"></div>ωn</div>'+
      '<div class="lgd-item"><div class="lgd-dash" style="border-color:#16a34a"></div>ωd</div>';
  else
    l.innerHTML='<div class="lgd-item"><div class="lgd-dash" style="border-color:#9ba5b4"></div>Input</div>'+
      '<div class="lgd-item"><div class="lgd-line" style="background:#2563eb"></div>Output</div>';
}

function drawGraph(){rgc();if(S.tab==='bode')drawBode();else drawTime();updateLegend()}

// Tabs
document.querySelectorAll('.tb').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('.tb').forEach(x=>x.classList.remove('ac'));b.classList.add('ac');S.tab=b.dataset.t;drawGraph()}
});

// Sliders
function initSlider(rId,vId,key,unit,dec){
  const r=document.getElementById(rId),v=document.getElementById(vId);
  v.textContent=parseFloat(r.value).toFixed(dec)+' '+unit;S[key]=parseFloat(r.value);
  r.oninput=()=>{S[key]=parseFloat(r.value);v.textContent=parseFloat(r.value).toFixed(dec)+' '+unit;onParamChange()}
}
function onParamChange(){
  simulate();drawGraph();
}
initSlider('kR','kVal','K','Nm/rad',0);
initSlider('jR','jVal','J','kg·m²',2);
initSlider('wR','wVal','wDrive','rad/s',1);

// Animation
let lastTs=null;
function animate(ts){
  if(lastTs===null)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;
  if(S.simData){
    S.animTime+=dt;
    if(S.animTime>=S.simData.T)S.animTime-=S.simData.T;
    drawArm();
    if(S.tab==='time'){rgc();drawTime()}
  }
  requestAnimationFrame(animate);
}

// Init
onParamChange();
requestAnimationFrame(animate);
window.addEventListener('resize',drawGraph);
</script>
</body>
</html>
